---
- name: Install Python3 and pip
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
    state: present

- name: Install Flask dependencies
  ansible.builtin.pip:
    name:
      - flask
      - mysql-connector-python
      - gunicorn
    state: present

- name: Create Flask app directory
  ansible.builtin.file:
    path: /opt/flask
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Deploy Flask app
  ansible.builtin.template:
    src: app.py.j2
    dest: /opt/flask/app.py
    owner: ec2-user
    group: ec2-user
    mode: '0644'
  notify: restart flask

- name: Deploy Flask systemd unit
  ansible.builtin.template:
    src: flask.service.j2
    dest: /etc/systemd/system/flask.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart flask

- name: Enable and start Flask service
  ansible.builtin.systemd_service:
    name: flask
    enabled: true
    state: started
    daemon_reload: true
